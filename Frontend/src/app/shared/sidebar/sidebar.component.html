<!-- ── Botón hamburguesa (solo mobile) ──────────────────────────── -->
<button class="sidebar-toggle" (click)="toggleSidebar()" [class.open]="sidebarOpen">
  <i class="bi" [class.bi-list]="!sidebarOpen" [class.bi-x-lg]="sidebarOpen"></i>
</button>

<!-- ── Overlay (mobile) ─────────────────────────────────────────── -->
<div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>

<!-- ── Sidebar ───────────────────────────────────────────────────── -->
<aside class="saed-sidebar" [class.open]="sidebarOpen">

  <div class="sidebar-logo">
    <img src="../../../assets/images/logos/iconuts.png" alt="UTS" class="logo-img" />
    <span class="logo-version">v1.0.0</span>
  </div>

  <div class="sidebar-divider"></div>

  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li class="nav-item" *ngFor="let item of sidebarnavItems"
          [class.has-submenu]="item.submenu.length > 0"
          [class.open]="showMenu === item.title">

        <!-- Sin submenu -->
        <a *ngIf="item.submenu.length === 0"
           class="nav-link"
           [routerLink]="item.path"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
           (click)="closeSidebar()">
          <i [class]="item.icon + ' nav-icon'"></i>
          <span class="nav-label">{{ item.title }}</span>
        </a>

        <!-- Con submenu -->
        <a *ngIf="item.submenu.length > 0"
           class="nav-link nav-link-parent"
           [class.open]="showMenu === item.title"
           (click)="toggleSubmenu(item.title)">
          <i [class]="item.icon + ' nav-icon'"></i>
          <span class="nav-label">{{ item.title }}</span>
          <i class="bi bi-chevron-down chevron" [class.rotated]="showMenu === item.title"></i>
        </a>

        <ul class="submenu-list" *ngIf="item.submenu.length > 0 && showMenu === item.title">
          <li *ngFor="let sub of item.submenu">
            <a class="submenu-link"
               [routerLink]="sub.path"
               routerLinkActive="active"
               (click)="closeSidebar()">
              <i [class]="sub.icon + ' sub-icon'"></i>
              <span>{{ sub.title }}</span>
            </a>
          </li>
        </ul>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-divider"></div>
    <button class="btn-logout" (click)="logout()">
      <i class="bi bi-box-arrow-right"></i>
      <span>Cerrar sesión</span>
    </button>
  </div>

</aside>
