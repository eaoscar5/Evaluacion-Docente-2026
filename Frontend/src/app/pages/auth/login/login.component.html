<div class="backdrop" 
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
           background: url(../../../../assets/images/bg/auth-bg.jpg) no-repeat center center; 
           background-size: cover; filter: blur(3px); opacity: 50%;">
</div>

<div class="auth-wrapper d-flex justify-content-center align-items-center vh-100">
    <div>
        <div class="auth-box shadow-lg rounded bg-white p-4">
            <!-- Logo y Título -->
            <div class="text-center">
                <span class="db">
                    <img src="../../../../assets/images/logos/utslogo.png" alt="logo" height="80px" class="mb-3">
                </span>
                <hr>
                <h3 class="font-medium mb-4">Iniciar sesión</h3>
            </div>
            
            <!-- Alerta de error -->
            <div *ngIf="errorMsg" class="alert alert-danger d-flex align-items-center" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span>{{ errorMsg }}</span>
            </div>

            <!-- Formulario de Login -->
            <div class="row">
                <div class="col-12">
                    <form [formGroup]="form" (ngSubmit)="submit()" class="form-horizontal mt-3" novalidate>
                        
                        <!-- Credencial -->
                        <div class="mb-3">
                            <div class="input-group" [class.is-invalid]="credencialInvalid">
                                <span class="input-group-text">
                                    <i class="bi bi-person-fill"></i>
                                </span>
                                <input 
                                    class="form-control form-control-lg"
                                    [class.is-invalid]="credencialInvalid"
                                    type="text" 
                                    formControlName="credencial"
                                    placeholder="Matrícula, Número de Empleado o Correo"
                                    autocomplete="username">
                            </div>
                            <div *ngIf="credencialInvalid" class="text-danger small mt-1 ps-1">
                                Ingresa tu matrícula, número de empleado o correo.
                            </div>
                        </div>

                        <!-- Contraseña -->
                        <div class="mb-3">
                            <div class="input-group" [class.is-invalid]="passwordInvalid">
                                <span class="input-group-text">
                                    <i class="bi bi-lock-fill"></i>
                                </span>
                                <input 
                                    class="form-control form-control-lg"
                                    [class.is-invalid]="passwordInvalid"
                                    type="password" 
                                    formControlName="password" 
                                    placeholder="Contraseña"
                                    autocomplete="current-password">
                            </div>
                            <div *ngIf="passwordInvalid" class="text-danger small mt-1 ps-1">
                                Ingresa tu contraseña.
                            </div>
                        </div>

                        <hr>
                        <br>
                        <!-- Botón de Continuar -->
                        <div class="form-group text-center mt-3">
                            <button 
                                [disabled]="loading" 
                                type="submit" 
                                class="btn btn-info btn-lg w-100">
                                <span *ngIf="!loading">Continuar</span>
                                <span *ngIf="loading">
                                    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                                    Por favor, espere...
                                </span>
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Imagen de soporte en la esquina inferior derecha -->
    <div class="position-absolute bottom-0 end-0 size-support">
        <div class="d-flex justify-content-end animate__animated animate__bounce">
            <img src="../../../../assets/images/logos/reporte.png" class="rounded w-100" alt="Soporte">
        </div>
    </div>
</div>
